services:
  api:
    build:
      context: .
      dockerfile: Api/Dockerfile
    depends_on:
      otel-collector:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5232
      ConnectionStrings__DB: ${DB_CONNECTION_STRING}
      ConnectionStrings__Redis: ${REDIS_CONNECTION_STRING:-}
      Database__AutoMigrate: "true"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Admin__Emails__0: ${ADMIN_EMAIL}
      Cors__AllowedOrigins__0: http://localhost:${WEB_PORT:-8080}
      Cors__AllowedOrigins__1: http://localhost:5173
      BookCovers__S3__Endpoint: ${BOOK_COVERS__S3__ENDPOINT:-}
      BookCovers__S3__Region: ${BOOK_COVERS__S3__REGION:-}
      BookCovers__S3__AccessKey: ${BOOK_COVERS__S3__ACCESS_KEY:-}
      BookCovers__S3__SecretKey: ${BOOK_COVERS__S3__SECRET_KEY:-}
      BookCovers__S3__Bucket: ${BOOK_COVERS__S3__BUCKET:-}
      OTEL_SERVICE_NAME: novelki-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    volumes:
      - ./storage/covers:/app/storage/covers
    ports:
      - "${API_PORT:-5232}:5232"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5232/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:${API_PORT:-5232}/api/v1}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - target: 80
        published: "${WEB_PORT:-8080}"
        protocol: tcp
        mode: host

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.139.0
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./observability/otel-collector.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
    depends_on:
      - loki
      - tempo

  loki:
    image: grafana/loki:3.5.7
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./observability/loki.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:2.9.0
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./observability/tempo.yml:/etc/tempo/config.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"

  prometheus:
    image: prom/prometheus:v3.7.3
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:12.3.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - loki
      - tempo
      - prometheus

volumes:
  loki-data:
  tempo-data:
  prometheus-data:
  grafana-data:
