<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Estimated reading time</title>
  <desc id="desc">Horizontal bars showing estimated reading hours for Novel, Manga and Manhwa.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <pattern id="hatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="8" stroke="#cbd5e1" stroke-width="3"/></pattern>
  </defs>
  <rect x="0" y="0" width="1200" height="540" rx="0" fill="#f1f5f9" stroke="none" stroke-width="1" opacity="1"/>
  <rect x="22" y="18" width="1156" height="504" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" opacity="1"/>
  <rect x="22" y="18" width="7" height="504" rx="4" fill="#06b6d4" stroke="none" stroke-width="1" opacity="1"/>
  <text x="48" y="51" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="19" font-weight="750" fill="#0f172a" opacity="1">Estimated reading time</text>
  <text x="48" y="76" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="450" fill="#64748b" opacity="1">Convert current chapter volume with a user-controlled pace for each type.</text>
  <rect x="1042" y="28" width="126" height="28" rx="14" fill="#ecfeff" stroke="#a5f3fc" stroke-width="1" opacity="1"/><text x="1105" y="47" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="750" fill="#0e7490" opacity="1">BASELINE CSV</text>
  <line x1="48" y1="101" x2="1152" y2="101" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="48" y="124" width="800" height="376" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" opacity="1"/><rect x="872" y="124" width="280" height="376" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" opacity="1"/><text x="176" y="202" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="540" fill="#475569" opacity="1">Novel</text><rect x="190" y="185" width="610" height="20" rx="10" fill="#f1f5f9" stroke="none" stroke-width="1" opacity="1"/><rect x="190" y="185" width="586.034625" height="20" rx="10" fill="#2563eb" stroke="none" stroke-width="1" opacity="1"/><text x="784.034625" y="202" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#0f172a" opacity="1">7,685.7 h</text><text x="176" y="272" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="540" fill="#475569" opacity="1">Manga</text><rect x="190" y="255" width="610" height="20" rx="10" fill="#f1f5f9" stroke="none" stroke-width="1" opacity="1"/><rect x="190" y="255" width="220.446375" height="20" rx="10" fill="#06b6d4" stroke="none" stroke-width="1" opacity="1"/><text x="418.446375" y="272" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#0f172a" opacity="1">2,891.1 h</text><text x="176" y="342" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="540" fill="#475569" opacity="1">Manhwa</text><rect x="190" y="325" width="610" height="20" rx="10" fill="#f1f5f9" stroke="none" stroke-width="1" opacity="1"/><rect x="190" y="325" width="18.9405" height="20" rx="10" fill="#0f766e" stroke="none" stroke-width="1" opacity="1"/><text x="216.9405" y="342" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#0f172a" opacity="1">248.4 h</text><text x="82" y="454" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="550" fill="#64748b" opacity="1">Assumption: 5 minutes per chapter for each content type</text>
  <text x="896" y="158" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="750" fill="#64748b" opacity="1">ESTIMATED TOTAL</text><text x="896" y="194" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="25" font-weight="760" fill="#2563eb" opacity="1">10,825 h</text><text x="896" y="214" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="520" fill="#64748b" opacity="1">at current defaults</text><text x="896" y="266" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="25" font-weight="760" fill="#0f172a" opacity="1">451 days</text><text x="896" y="286" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="520" fill="#64748b" opacity="1">continuous time</text><text x="896" y="338" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="25" font-weight="760" fill="#0f172a" opacity="1">129,902</text><text x="896" y="358" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="520" fill="#64748b" opacity="1">known current chapters</text><line x1="896" y1="415" x2="1128" y2="415" stroke="#e2e8f0" stroke-width="1"/><text x="896" y="435" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="450" fill="#64748b" opacity="1">Let users change minutes per type</text><text x="896" y="453" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="450" fill="#64748b" opacity="1">and store the preference locally.</text>
</svg>
