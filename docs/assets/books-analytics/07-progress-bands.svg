218" y="253.16250000000002" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#0f172a" opacity="1">0</text><text x="194" y="288.9125" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="540" fill="#475569" opacity="1">50–74%</text><rect x="208" y="272.25" width="590" height="19.6625" rx="9.83125" fill="#f1f5f9" stroke="none" stroke-width="1" opacity="1"/><rect x="208" y="272.25" width="2" height="19.6625" rx="9.83125" fill="#16a34a" stroke="none" stroke-width="1" opacity="1"/><text x="218" y="288.9125" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#0f172a" opacity="1">1</text><text x="194" y="324.6625" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="540" fill="#475569" opacity="1">75–99%</text><rect x="208" y="308" width="590" height="19.6625" rx="9.83125" fill="#f1f5f9" stroke="none" stroke-width="1" opacity="1"/><rect x="208" y="308" width="2" height="19.6625" rx="9.83125" fill="#16a34a" stroke="none" stroke-width="1" opacity="1"/><text x="218" y="324.6625" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#0f172a" opacity="1">1</text><text x="194" y="360.4125" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="540" fill="#475569" opacity="1">100%</text><rect x="208" y="343.75" width="590" height="19.6625" rx="9.83125" fill="#f1f5f9" stroke="none" stroke-width="1" opacity="1"/><rect x="208" y="343.75" width="50.321384425216316" height="19.6625" rx="9.83125" fill="#16a34a" stroke="none" stroke-width="1" opacity="1"/><text x="266.3213844252163" y="