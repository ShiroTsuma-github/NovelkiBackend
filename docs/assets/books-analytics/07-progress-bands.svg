<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Progress bands</title>
  <desc id="desc">Horizontal bars for completion percentage bands and an unknown total category.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <pattern id="hatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="8" stroke="#cbd5e1" stroke-width="3"/></pattern>
  </defs>
  <rect x="0" y="0" width="1200" height="540" rx="0" fill="#f1f5f9" stroke="none" stroke-width="1" opacity="1"/>
  <rect x="22" y="18" width="1156" height="504" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" opacity="1"/>
  <rect x="22" y="18" width="7" height="504" rx="4" fill="#06b6d4" stroke="none" stroke-width="1" opacity="1"/>
