"11" font-weight="700" fill="#0f172a" opacity="1">0.0%</text><text x="82" y="486" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="520" fill="#64748b" opacity="1">Genres, links and covers are relational fields and are not present in the CSV export.</text>
  <text x="896" y="158" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="750" fill="#64748b" opacity="1">NEXT DATA TASK</text><text x="896" y="194" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="25" font-weight="760" fill="#e11d48" opacity="1">738</text><text x="896" y="214" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="520" fill="#64748b" opacity="1">missing total chapters</text><text x="896" y="266" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="25" font-weight="760" fill="#0f172a" opacity="1">728</text><text x="896" y="286" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="520" fill="#64748b" opacity="1">unrated books</text><text x="896" y="338" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="25" font-weight="760" fill="#0f172a" opacity="1">809</text><text x="896" y="358" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="520" fill="#64748b" opacity="1">missing CSV authors</text><line x1="896" y1="415" x2="1128" y2="415" stroke="#e2e8f0" stroke-width="1"/><text x="896" y="435" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="450" fill="#64748b" opacity="1">Use this view as a work queue, not</text><text x="896" y="453" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="450" fill="#64748b" opacity="1">as a user score.</text>
