<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Chapter volume by content type</title>
  <desc id="desc">Two aligned horizontal bar charts compare book counts and current chapters for Manga, Novel and Manhwa.</desc>
