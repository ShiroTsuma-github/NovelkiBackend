  <text x="896" y="158" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="750" fill="#64748b" opacity="1">LINK COVERAGE</text><text x="896" y="194" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="25" font-weight="760" fill="#06b6d4" opacity="1">68.6%</text><text x="896" y="214" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="520" fill="#64748b" opacity="1">books with a link</text><text x="896" y="266" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="25" font-weight="760" fill="#0f172a" opacity="1">821</text><text x="896" y="286" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="520" fill="#64748b" opacity="1">links total</text><text x="896" y="338" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="25" font-weight="760" fill="#0f172a" opacity="1">1.48</text><text x="896" y="358" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="520" fill="#64748b" opacity="1">links per linked book</text><line x1="896" y1="415" x2="1128" y2="415" stroke="#e2e8f0" stroke-width="1"/><text x="896" y="435" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="450" fill="#64748b" opacity="1">Count links by SourceType and</text><text x="896" y="453" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="450" fill="#64748b" opacity="1">books with at least one source</text><text x="896" y="471" text-anchor="start"