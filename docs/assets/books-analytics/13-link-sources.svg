<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Link sources</title>
  <desc id="desc">Horizontal ranking of future link source types such as NovelUpdates, Official and MangaDex.</desc>
